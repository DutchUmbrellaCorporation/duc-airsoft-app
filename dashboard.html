<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dutch Umbrella Corp. - Command & Control Network</title>
  <style>
    body { background-color: #09090b; color: #fafafa; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
    .wrapper { max-width: 1400px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #dc2626; padding-bottom: 15px; margin-bottom: 25px; }
    .brand-section { display: flex; align-items: center; gap: 15px; }
    .logo-umbrella { width: 40px; height: 40px; background: conic-gradient(#ef4444 0 45deg, #fff 45deg 90deg, #ef4444 90deg 135deg, #fff 135deg 180deg, #ef4444 180deg 225deg, #fff 225deg 270deg, #ef4444 270deg 315deg, #fff 315deg 360deg); border-radius: 50%; border: 2px solid #ef4444; }
    .brand-title h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 0.05em; }
    .brand-title p { margin: 2px 0 0 0; font-size: 11px; color: #dc2626; font-weight: bold; letter-spacing: 0.1em; }
    .user-controls { display: flex; align-items: center; gap: 12px; }
    
    .btn-admin { display: none; background-color: #1c1917; border: 1px solid #d97706; color: #f59e0b; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
    .btn-logout { background-color: #27272a; color: white; border: 1px solid #3f3f46; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }

    .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
    .sidebar { display: flex; flex-direction: column; gap: 24px; }
    .main-content { display: flex; flex-direction: column; gap: 24px; }
    .panel { background-color: #111113; border: 1px solid #27272a; border-radius: 12px; padding: 20px; }
    .panel-accent { border-color: #ef4444; }
    .panel-title { font-size: 13px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 16px; }
    .data-list { display: flex; flex-direction: column; gap: 10px; }
    .data-row { display: flex; justify-content: space-between; align-items: center; background-color: #09090b; border: 1px solid #18181b; padding: 12px 16px; border-radius: 6px; font-size: 13px; }
    .font-bold { font-weight: bold; color: #ffffff; }
    .console-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .console-title { font-size: 18px; font-weight: 900; text-transform: uppercase; }
    .console-title span { color: #ef4444; }
    .global-kd { font-size: 11px; font-weight: bold; color: #ffffff; background: #09090b; padding: 4px 10px; border-radius: 4px; border: 1px solid #27272a; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    select { background-color: #09090b; border: 1px solid #27272a; color: white; padding: 12px; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 16px; }
    .counter-box { border: 1px solid #27272a; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; text-transform: uppercase; padding: 14px; }
    .counter-box.kills { background-color: rgba(22, 163, 74, 0.15); border-color: #16a34a; color: #22c55e; }
    .counter-box.deaths { background-color: rgba(220, 38, 38, 0.15); border-color: #dc2626; color: #ef4444; }
    .btn-submit { background-color: #f43f5e; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 13px; }
    .arsenal-header { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; margin-bottom: 15px; }
    .arsenal-title { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #71717a; }
    .arsenal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .arsenal-card { background-color: #09090b; border: 1px solid #27272a; padding: 14px 16px; border-radius: 6px; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; }
    .arsenal-card span { color: #71717a; font-size: 11px; }
    .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .log-table th { text-align: left; padding: 10px 16px; color: #71717a; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid #27272a; }
    .log-table td { padding: 14px 16px; border-bottom: 1px solid #18181b; color: #a1a1aa; }
    .text-green { color: #22c55e; font-weight: bold; }
    .text-red { color: #ef4444; font-weight: bold; }
    @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="brand-section">
        <div class="logo-umbrella"></div>
        <div class="brand-title">
          <h1>DUTCH UMBRELLA CORP.</h1>
          <p>COMMAND & CONTROL NETWORK // V5.3</p>
        </div>
      </div>
      <div class="user-controls">
        <span id="display-user" style="font-size:12px; font-weight:bold; color:#71717a; margin-right:10px;">Laden...</span>
        <button class="btn-admin" id="admin-panel-btn">🔒 Admin Panel</button>
        <button class="btn-logout" id="logout-btn">Uitloggen</button>
      </div>
    </header>

    <div class="dashboard-grid">
      <div class="sidebar">
        <div class="panel panel-accent">
          <div class="panel-title">🏆 Operator Standen</div>
          <div class="data-list">
            <div class="data-row"><span>Command_HQ</span><span class="font-bold">3.00</span></div>
            <div class="data-row"><span>Ghost_DUC</span><span class="font-bold">0.94</span></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-title">📍 Locatie Analyse</div>
          <div class="data-list">
            <div class="data-row"><span>Gasselte (The Outpost)</span><span class="font-bold">0.87</span></div>
            <div class="data-row"><span>Helenaveen (Bunker Hill)</span><span class="font-bold">0.00</span></div>
            <div class="data-row"><span>Veluwe (The Dark Forest)</span><span class="font-bold">0.00</span></div>
          </div>
        </div>
      </div>

      <div class="main-content">
        <div class="panel">
          <div class="console-header">
            <div class="console-title">Console: <span id="console-username">Laden...</span></div>
            <div class="global-kd">K/D: <span>0.94</span></div>
          </div>
          <div class="form-row">
            <select id="select-replica">
              <option value="Tokyo Marui Mk18 GBB">Tokyo Marui Mk18 GBB</option>
              <option value="Lancer Tactical LT-19">Lancer Tactical LT-19</option>
            </select>
            <select id="select-location">
              <option value="Gasselte (The Outpost)">Gasselte (The Outpost)</option>
              <option value="Helenaveen (Bunker Hill)">Helenaveen (Bunker Hill)</option>
              <option value="Veluwe (The Dark Forest)">Veluwe (The Dark Forest)</option>
            </select>
          </div>
          <div class="action-row">
            <div class="counter-box kills" id="btn-add-kill" style="cursor:pointer;">+1 Kill</div>
            <div class="counter-box deaths" id="btn-add-death" style="cursor:pointer;">+1 Death</div>
            <button class="btn-submit" id="btn-submit-report">Rapport Opslaan</button>
          </div>
          <div class="
