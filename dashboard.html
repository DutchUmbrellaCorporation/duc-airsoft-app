<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dutch Umbrella Corp - Command Center</title>
  <style>
    body { 
      background-color: #09090b; 
      color: #fafafa; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 24px; }
    .panel { background-color: #111113; border: 1px solid #27272a; border-radius: 16px; padding: 24px; }
    .border-accent { border-color: #ef4444; box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.05); }
    .header-box { display: flex; justify-content: space-between; align-items: center; }
    .flex-row { display: flex; align-items: center; gap: 16px; }
    .logo-circle { width: 48px; height: 48px; border-radius: 50%; border: 2px dashed #ef4444; display: flex; align-items: center; justify-content: center; }
    .logo-dot { width: 24px; height: 24px; border-radius: 50%; background-color: rgba(239, 68, 68, 0.2); }
    h1 { margin: 0; font-size: 20px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
    h2 { margin: 0 0 20px 0; font-size: 14px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #ef4444; border-bottom: 1px solid #27272a; padding-bottom: 8px; }
    .subtitle { font-size: 12px; color: #71717a; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 32px; }
    .stat-card { background-color: #09090b; border: 1px solid #27272a; padding: 20px; border-radius: 12px; text-align: center; }
    .stat-card.kd-card { border-color: rgba(239, 68, 68, 0.3); background-color: rgba(239, 68, 68, 0.02); }
    .stat-label { font-size: 12px; text-transform: uppercase; color: #a1a1aa; font-weight: bold; }
    .stat-value { font-size: 40px; font-weight: 900; margin-top: 8px; }
    .kd-card .stat-label { color: #f87171; }
    .kd-card .stat-value { color: #ef4444; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }
    button { padding: 12px 24px; border-radius: 8px; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: background-color 0.2s; border: none; }
    .btn-kill { background-color: #16a34a; color: white; }
    .btn-kill:hover { background-color: #22c55e; }
    .btn-death { background-color: #dc2626; color: white; }
    .btn-death:hover { background-color: #ef4444; }
    .btn-reset { background-color: #09090b; color: #71717a; border: 1px solid #27272a; }
    .btn-reset:hover { background-color: #18181b; color: #a1a1aa; }
    .btn-logout { background-color: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; padding: 8px 16px; }
    .btn-logout:hover { background-color: #3f3f46; }
    @media (max-width: 600px) { .header-box { flex-direction: column; text-align: center; gap: 16px; } .flex-row { flex-direction: column; } }
  </style>
</head>
<body>

  <div class="container">
    <div class="panel header-box">
      <div class="flex-row">
        <div class="logo-circle"><div class="logo-dot"></div></div>
        <div>
          <h1>D.U.C. Dashboard</h1>
          <p class="subtitle">Live Team Stats & Telemetry</p>
        </div>
      </div>
      <button id="btn-logout" class="btn-logout">Uitloggen</button>
    </div>

    <div class="panel border-accent">
      <h2>🎯 Live K/D Ratio Tracker</h2>
      <div class="stat-grid">
        <div class="stat-card"><p class="stat-label">Totale Kills</p><p id="stat-kills" class="stat-value">0</p></div>
        <div class="stat-card"><p class="stat-label">Totale Deaths</p><p id="stat-deaths" class="stat-value">0</p></div>
        <div class="stat-card kd-card"><p class="stat-label">Team K/D Ratio</p><p id="stat-kd" class="stat-value">0.00</p></div>
      </div>
      <div class="btn-group">
        <button id="btn-add-kill" class="btn-kill">+1 Kill Toevoegen</button>
        <button id="btn-add-death" class="btn-death">+1 Death Toevoegen</button>
        <button id="btn-reset" class="btn-reset">Reset Status</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBSsemNAprUypHzECJ48SXRpYGCWY3ilIs",
      authDomain: "duc-airsoft-network.firebaseapp.com",
      projectId: "duc-airsoft-network",
      storageBucket: "duc-airsoft-network.firebasestorage.app",
      messagingSenderId: "208621488866",
      appId: "1:208621488866:web:4c2a3db3f659167211acbb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const statsDocRef = doc(db, "teamstats", "global");

    let currentKills = 0;
    let currentDeaths = 0;

    onSnapshot(statsDocRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        currentKills = data.kills || 0;
        currentDeaths = data.deaths || 0;
      } else {
        setDoc(statsDocRef, { kills: 0, deaths: 0 });
      }
      
      document.getElementById("stat-kills").innerText = currentKills;
      document.getElementById("stat-deaths").innerText = currentDeaths;

      let kdRatio = currentDeaths > 0 ? currentKills / currentDeaths : currentKills;
      document.getElementById("stat-kd").innerText = kdRatio.toFixed(2);
    });

    document.getElementById("btn-add-kill").addEventListener("click", async () => {
      try { await updateDoc(statsDocRef, { kills: increment(1) }); } catch (e) { console.error(e); }
    });

    document.getElementById("btn-add-death").addEventListener("click", async () => {
      try { await updateDoc(statsDocRef, { deaths: increment(1) }); } catch (e) { console.error(e); }
    });

    document.getElementById("btn-reset").addEventListener("click", async () => {
      if (confirm("Weet je zeker dat je alle teamstatistieken wilt resetten naar 0?")) {
        try { await setDoc(statsDocRef, { kills: 0, deaths: 0 }); } catch (e) { console.error(e); }
      }
    });

    document.getElementById("btn-logout").addEventListener("click", () => { window.location.href = "index.html"; });
  </script>
</body>
</html>
