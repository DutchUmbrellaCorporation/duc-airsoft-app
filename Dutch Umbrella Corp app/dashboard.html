<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dutch Umbrella Corp - Command Center</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #09090b; color: #fafafa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .bg-umbrella-panel { background-color: #111113; border: 1px solid #27272a; }
    .border-umbrella { border-color: #ef4444; }
    .accent-red { color: #ef4444; }
    .bg-accent-red { background-color: #ef4444; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">

  <div class="max-w-4xl mx-auto space-y-6">
    
    <!-- HEADER -->
    <div class="bg-umbrella-panel rounded-2xl p-6 border border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="flex items-center space-x-4">
        <div class="w-12 h-12 rounded-full border-2 border-dashed border-red-500 flex items-center justify-center">
          <div class="w-6 h-6 rounded-full bg-red-500/20"></div>
        </div>
        <div>
          <h1 class="text-xl font-black uppercase tracking-wider text-white">D.U.C. Dashboard</h1>
          <p class="text-xs text-zinc-500 uppercase tracking-widest">Live Team Stats & Telemetry</p>
        </div>
      </div>
      <button onclick="handleLogout()" class="bg-zinc-800 hover:bg-zinc-700 text-zinc-300 text-xs font-bold uppercase tracking-wider py-2 px-4 rounded-lg transition border border-zinc-700">
        Uitloggen
      </button>
    </div>

    <!-- REALTIME K/D TRACKER PANEL -->
    <div class="bg-umbrella-panel rounded-2xl p-6 border border-umbrella shadow-lg shadow-red-500/5">
      <h2 class="text-sm font-black uppercase tracking-widest text-red-500 mb-6 border-b border-zinc-800 pb-2">🎯 Live K/D Ratio Tracker</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center mb-8">
        <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
          <p class="text-xs uppercase tracking-wider text-zinc-500 font-bold">Totale Kills</p>
          <p id="stat-kills" class="text-4xl font-black text-white mt-1">0</p>
        </div>
        <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-800">
          <p class="text-xs uppercase tracking-wider text-zinc-500 font-bold">Totale Deaths</p>
          <p id="stat-deaths" class="text-4xl font-black text-white mt-1">0</p>
        </div>
        <div class="bg-zinc-950 p-4 rounded-xl border border-red-500/20 bg-red-500/5">
          <p class="text-xs uppercase tracking-wider text-red-400 font-bold">Team K/D Ratio</p>
          <p id="stat-kd" class="text-4xl font-black text-red-500 mt-1">0.00</p>
        </div>
      </div>

      <!-- BEDIENINGSKNOPPEN -->
      <div class="flex flex-wrap gap-4 justify-center">
        <button onclick="updateStats(1, 0)" class="bg-green-600 hover:bg-green-500 text-white text-xs font-black uppercase tracking-widest py-3 px-6 rounded-lg transition shadow-lg shadow-green-600/10">
          +1 Kill Toevoegen
        </button>
        <button onclick="updateStats(0, 1)" class="bg-red-600 hover:bg-red-500 text-white text-xs font-black uppercase tracking-widest py-3 px-6 rounded-lg transition shadow-lg shadow-red-600/10">
          +1 Death Toevoegen
        </button>
        <button onclick="resetStats()" class="bg-zinc-900 hover:bg-zinc-800 text-zinc-500 hover:text-zinc-400 text-xs font-bold uppercase tracking-wider py-3 px-4 rounded-lg transition border border-zinc-800">
          Reset Status
        </button>
      </div>
    </div>

  </div>

  <!-- REALTIME FIREBASE INTEGRATIE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase configuratie uit image_2b049d.png
    const firebaseConfig = {
      apiKey: "AIzaSyBSsemNAprUypHzECJ48SXRpYGCWY3ilIs",
      authDomain: "duc-airsoft-network.firebaseapp.com",
      projectId: "duc-airsoft-network",
      storageBucket: "duc-airsoft-network.firebasestorage.app",
      messagingSenderId: "208621488866",
      appId: "1:208621488866:web:4c2a3db3f659167211acbb"
    };

    // Initialize Firebase & Firestore
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Verwijs naar het centrale document voor de teamstats
    const statsDocRef = doc(db, "teamstats", "global");

    // LOKALE APPLICATIE-LOGICA DIE INTERAGEERT MET DE CLOUD
    let currentKills = 0;
    let currentDeaths = 0;

    // LIVE LISTENER: Dit luistert 24/7 naar wijzigingen in de database!
    // Zodra iemand ergens op de wereld op een knop drukt, verandert dit op ELK scherm direct mee.
    onSnapshot(statsDocRef, (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        currentKills = data.kills || 0;
        currentDeaths = data.deaths || 0;
      } else {
        // Als het document nog niet bestaat in Firebase, maken we hem hier direct aan
        setDoc(statsDocRef, { kills: 0, deaths: 0 });
        currentKills = 0;
        currentDeaths = 0;
      }
      
      // Update de cijfers op het scherm
      document.getElementById("stat-kills").innerText = currentKills;
      document.getElementById("stat-deaths").innerText = currentDeaths;

      // Bereken de K/D ratio
      let kdRatio = 0;
      if (currentDeaths > 0) {
        kdRatio = currentKills / currentDeaths;
      } else {
        kdRatio = currentKills; // Voorkom delen door nul
      }
      document.getElementById("stat-kd").innerText = kdRatio.toFixed(2);
    });

    // KNOP-FUNCTIES KOPPELEN AAN FIREBASE INC-FUNCTIE
    window.updateStats = async function(killDelta, deathDelta) {
      try {
        await updateDoc(statsDocRef, {
          kills: increment(killDelta),
          deaths: increment(deathDelta)
        });
      } catch (error) {
        console.error("Fout tijdens synchroniseren van stats: ", error);
      }
    };

    window.resetStats = async function() {
      if (confirm("Weet je zeker dat je alle teamstatistieken wilt resetten naar 0?")) {
        try {
          await setDoc(statsDocRef, { kills: 0, deaths: 0 });
        } catch (error) {
          console.error("Fout tijdens resetten van stats: ", error);
        }
      }
    };

    window.handleLogout = function() {
      window.location.href = "index.html";
    };
  </script>

</body>
</html>
