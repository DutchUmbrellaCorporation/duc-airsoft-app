<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dutch Umbrella Corp - Secure Gate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #09090b; color: #fafafa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .bg-umbrella-panel { background-color: #111113; border: 1px solid #27272a; }
    .border-umbrella { border-color: #ef4444; }
    .accent-red { color: #ef4444; }
    .bg-accent-red { background-color: #ef4444; }
    .auth-card { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(239, 68, 68, 0.05); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-umbrella-panel rounded-2xl p-8 auth-card border border-umbrella relative overflow-hidden">
    
    <!-- LOGO HEADER -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-20 h-20 bg-zinc-900 rounded-full flex items-center justify-center border border-zinc-800 relative shadow-lg shadow-red-500/10 mb-4">
        <!-- Umbrella symbool mockup -->
        <div class="absolute inset-0 bg-red-500/5 animate-pulse rounded-full"></div>
        <div class="w-10 h-10 rounded-full border-4 border-dashed border-red-500"></div>
      </div>
      <h1 class="text-xl font-black tracking-widest text-white uppercase text-center">D.U.C. Tactical Network</h1>
      <p class="text-xs text-zinc-500 uppercase tracking-wider mt-1">Restricted Access - Operators Only</p>
    </div>

    <!-- MELDINGEN ALERT BOX -->
    <div id="auth-alert" class="hidden mb-6 p-3 rounded-lg text-sm border font-medium text-center"></div>

    <!-- INLOG FORMULIER -->
    <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-bold mb-1">Operator E-mail</label>
        <input type="email" id="login-email" required placeholder="sam@team-duc.nl" class="w-full bg-zinc-950 border border-zinc-800 focus:border-red-500 text-white rounded-lg px-4 py-2.5 text-sm outline-none transition">
      </div>

      <div>
        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-bold mb-1">Toegangscode</label>
        <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-zinc-950 border border-zinc-800 focus:border-red-500 text-white rounded-lg px-4 py-2.5 text-sm outline-none transition">
      </div>

      <!-- ONTHOUD MIJ CHECKBOX (NIEUW) -->
      <div class="flex items-center space-x-2 py-1">
        <input type="checkbox" id="remember-me" class="w-4 h-4 rounded bg-zinc-950 border-zinc-800 accent-red-500 focus:ring-0 cursor-pointer">
        <label for="remember-me" class="text-xs text-zinc-400 uppercase tracking-wider font-bold cursor-pointer select-none">Onthoud mijn gegevens</label>
      </div>

      <button type="submit" class="w-full bg-accent-red hover:bg-red-600 text-white text-sm font-bold uppercase tracking-widest py-3 px-4 rounded-lg transition shadow-lg shadow-red-500/20">
        Verifieer Identiteit
      </button>

      <p class="text-center text-xs text-zinc-500 pt-2">
        Nieuwe operator? <button type="button" onclick="toggleForm()" class="text-red-400 hover:underline font-bold focus:outline-none">Registreer hier</button>
      </p>
    </form>

    <!-- REGISTRATIE FORMULIER -->
    <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4 hidden">
      <div>
        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-bold mb-1">Callsign / Operator Naam</label>
        <input type="text" id="reg-name" required placeholder="Bijv. Ghost" class="w-full bg-zinc-950 border border-zinc-800 focus:border-red-500 text-white rounded-lg px-4 py-2.5 text-sm outline-none transition">
      </div>

      <div>
        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-bold mb-1">E-mailadres</label>
        <input type="email" id="reg-email" required placeholder="naam@domein.com" class="w-full bg-zinc-950 border border-zinc-800 focus:border-red-500 text-white rounded-lg px-4 py-2.5 text-sm outline-none transition">
      </div>

      <div>
        <label class="block text-xs uppercase tracking-wider text-zinc-400 font-bold mb-1">Wachtwoord Aanmaken</label>
        <input type="password" id="reg-password" required placeholder="Minimaal 6 tekens" class="w-full bg-zinc-950 border border-zinc-800 focus:border-red-500 text-white rounded-lg px-4 py-2.5 text-sm outline-none transition">
      </div>

      <button type="submit" class="w-full bg-zinc-800 hover:bg-zinc-700 text-white text-sm font-bold uppercase tracking-widest py-3 px-4 rounded-lg transition border border-zinc-700">
        Aanvraag Indienen
      </button>

      <p class="text-center text-xs text-zinc-500 pt-2">
        Al een account? <button type="button" onclick="toggleForm()" class="text-red-400 hover:underline font-bold focus:outline-none">Inloggen</button>
      </p>
    </form>

  </div>

  <!-- SCRIPT LOGICA VOOR ENCRYPTIE EN LOCALSTORAGE -->
  <script>
    // Zodra de pagina laadt: check of er opgeslagen gegevens zijn
    document.addEventListener("DOMContentLoaded", () => {
      const savedEmail = localStorage.getItem("duc_email");
      const savedPassword = localStorage.getItem("duc_password");

      if (savedEmail && savedPassword) {
        document.getElementById("login-email").value = savedEmail;
        document.getElementById("login-password").value = savedPassword;
        document.getElementById("remember-me").checked = true;
      }
    });

    function showAlert(message, isSuccess = false) {
      const alertBox = document.getElementById("auth-alert");
      alertBox.innerText = message;
      alertBox.className = `mb-6 p-3 rounded-lg text-sm border font-medium text-center ${
        isSuccess 
          ? "bg-green-500/10 border-green-500/30 text-green-400" 
          : "bg-red-500/10 border-red-500/30 text-red-400"
      }`;
    }

    function toggleForm() {
      document.getElementById("login-form").classList.toggle("hidden");
      document.getElementById("register-form").classList.toggle("hidden");
      document.getElementById("auth-alert").className = "hidden";
    }

    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;
      const rememberMe = document.getElementById("remember-me").checked;

      // Haal geregistreerde gebruikers op uit localStorage
      const users = JSON.parse(localStorage.getItem("duc_users") || "[]");
      
      // Zoek of de operator bestaat en het wachtwoord klopt
      const validUser = users.find(u => u.email === email && u.password === password);

      if (validUser) {
        // Indien 'Onthoud mij' aan staat, bewaar de inloggegevens lokaal
        if (rememberMe) {
          localStorage.setItem("duc_email", email);
          localStorage.setItem("duc_password", password);
        } else {
          localStorage.removeItem("duc_email");
          localStorage.removeItem("duc_password");
        }

        showAlert("Identiteit geverifieerd. Welkom, " + validUser.name + "!", true);
        
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1000);
      } else {
        showAlert("Toegang geweigerd. Onjuiste e-mail of toegangscode.");
      }
    }

    function handleRegister(event) {
      event.preventDefault();
      const name = document.getElementById("reg-name").value;
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;

      if (password.length < 6) {
        showAlert("Wachtwoord moet minimaal 6 tekens bevatten.");
        return;
      }

      const users = JSON.parse(localStorage.getItem("duc_users") || "[]");
      
      if (users.some(u => u.email === email)) {
        showAlert("Dit e-mailadres is al gekoppeld aan een operator.");
        return;
      }

      // Voeg de nieuwe operator toe aan de database
      users.push({ name, email, password });
      localStorage.setItem("duc_users", JSON.stringify(users));

      showAlert("Registratie succesvol! Je kunt nu inloggen.", true);
      setTimeout(() => {
        toggleForm();
        document.getElementById("login-email").value = email;
        document.getElementById("login-password").value = password;
      }, 1500);
    }
  </script>

  <!-- PWA Koppeling -->
  <script src="pwa-link.js"></script>
</body>
</html>
