<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dutch Umbrella Corp - Secure Gate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0c0e; color: #e4e4e7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-umbrella-panel { background-color: #151518; border: 1px solid #27272a; }
        .border-umbrella { border-color: #27272a; }
        .accent-red { color: #f43f5e; }
        .bg-accent-red { background-color: #e11d48; }
        .auth-card { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 40px rgba(225, 29, 72, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-umbrella-panel rounded-2xl p-6 auth-card border border-umbrella relative overflow-hidden">
        <div class="text-center mb-8">
            <div class="w-16 h-16 rounded-full bg-white flex items-center justify-center overflow-hidden border-2 border-red-600 relative mx-auto shadow-lg shadow-red-900/20 mb-3">
                <div class="absolute w-full h-full bg-red-600 transform rotate-45 origin-center scale-75"></div>
                <div class="absolute w-full h-full bg-white transform -rotate-45 origin-center scale-50"></div>
                <div class="w-5 h-5 rounded-full bg-black z-10"></div>
            </div>
            <h1 class="text-xl font-black tracking-wider text-white uppercase">D.U.C. Tactical Network</h1>
            <p id="auth-subtitle" class="text-xs text-zinc-400 mt-1 font-mono">SECURE LOGIN PORTAL</p>
        </div>

        <div id="auth-alert" class="hidden mb-4 p-3 rounded-lg text-xs font-mono border text-center"></div>

        <!-- INLOG FORMULIER -->
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold font-mono">E-mailadres</label>
                <input type="email" id="login-email" required placeholder="naam@teamduc.nl" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500 font-mono">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold font-mono">Wachtwoord</label>
                <input type="password" id="login-password" required placeholder="••••••••" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500 font-mono">
            </div>
            <button type="submit" class="w-full bg-accent-red text-white text-xs font-bold uppercase tracking-widest py-3 px-4 rounded-lg font-mono">
                Verifieer Identiteit
            </button>
            <p class="text-center text-xs text-zinc-500 mt-4">
                Nieuwe operator? <button type="button" onclick="switchForm('register')" class="text-red-400 hover:underline font-bold">Vraag toegang aan</button>
            </p>
        </form>

        <!-- REGISTRATIE FORMULIER -->
        <form id="register-form" onsubmit="handleRegister(event)" class="space-y-4 hidden">
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold font-mono">Callsign / Operator Naam</label>
                <input type="text" id="reg-name" required placeholder="Bijv. Ghost_DUC" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500 font-mono">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold font-mono">E-mailadres</label>
                <input type="email" id="reg-email" required placeholder="naam@domain.com" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500 font-mono">
            </div>
            <div>
                <label class="block text-[10px] uppercase tracking-wider text-zinc-400 mb-1 font-bold font-mono">Wachtwoord aanmaken</label>
                <input type="password" id="reg-password" required placeholder="Minimaal 6 tekens" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500 font-mono">
            </div>
            <div class="bg-zinc-900/50 p-2.5 border border-zinc-800 rounded-lg text-[10px] text-zinc-500 font-mono">
                ⚠️ Nieuwe operators starten als `USER`. Admin-rechten moeten handmatig worden toegekend.
            </div>
            <button type="submit" class="w-full bg-zinc-800 border border-zinc-700 text-white text-xs font-bold uppercase tracking-widest py-3 px-4 rounded-lg font-mono">
                Account Registreren
            </button>
            <p class="text-center text-xs text-zinc-500 mt-4">
                Al een ID? <button type="button" onclick="switchForm('login')" class="text-red-400 hover:underline font-bold">Terug naar login</button>
            </p>
        </form>
    </div>

    <script>
        function switchForm(type) {
            document.getElementById('login-form').classList.toggle('hidden', type === 'register');
            document.getElementById('register-form').classList.toggle('hidden', type === 'login');
            document.getElementById('auth-subtitle').innerText = type === 'register' ? "REQUEST ACCESS PROTOCOL" : "SECURE LOGIN PORTAL";
        }
        function handleLogin(e) {
            e.preventDefault();
            window.location.href = 'dashboard.html'; // Stuurt je door naar het dashboard
        }
        function handleRegister(e) {
            e.preventDefault();
            alert("Account aangemaakt! Je kunt nu inloggen.");
            switchForm('login');
        }
    </script>
    <script src="pwa-link.js"></script>
</body>
</html>
