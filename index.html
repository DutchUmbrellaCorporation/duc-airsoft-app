<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dutch Umbrella Corp - Secure Gate</title>
  <style>
    body {
      background-color: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-panel {
      background-color: #111113;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.05);
      border-color: #ef4444;
      text-align: center;
      box-sizing: border-box;
    }
    .logo-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px dashed #ef4444;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px auto;
      animation: spin 20s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .logo-dot { width: 28px; height: 28px; border-radius: 50%; background-color: rgba(239, 68, 68, 0.2); }
    h1 { margin: 0; font-size: 22px; font-weight: 900; uppercase text-transform: uppercase; letter-spacing: 0.05em; }
    .subtitle { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 0.1em; margin: 4px 0 24px 0; }
    .input-group { text-align: left; margin-bottom: 20px; }
    label { display: block; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #a1a1aa; margin-bottom: 6px; letter-spacing: 0.05em; }
    input {
      width: 100%;
      padding: 12px;
      background-color: #09090b;
      border: 1px solid #27272a;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      box-sizing: border-box;
    }
    input:focus { outline: none; border-color: #ef4444; }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background-color: #dc2626;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s;
    }
    .btn-submit:hover { background-color: #ef4444; }
    .nav-link { font-size: 12px; color: #71717a; margin-top: 20px; display: block; text-decoration: none; }
    .nav-link:hover { color: #a1a1aa; }
  </style>
</head>
<body>

  <div class="login-panel">
    <div class="logo-circle"><div class="logo-dot"></div></div>
    <h1>D.U.C. Tactical Network</h1>
    <p class="subtitle">Restricted Access - Operators Only</p>
    
    <div class="input-group">
      <label>Operator E-mail</label>
      <input type="email" id="email" placeholder="naam@domein.com">
    </div>
    
    <div class="input-group">
      <label>Toegangscode</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    
    <button id="btn-login" class="btn-submit">Verifieer Identiteit</button>
    <a href="#" id="link-register" class="nav-link">Nieuwe operator? Registreer hier</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBSsemNAprUypHzECJ48SXRpYGCWY3ilIs",
      authDomain: "duc-airsoft-network.firebaseapp.com",
      projectId: "duc-airsoft-network",
      storageBucket: "duc-airsoft-network.firebasestorage.app",
      messagingSenderId: "208621488866",
      appId: "1:208621488866:web:4c2a3db3f659167211acbb"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Inloggen
    document.getElementById("btn-login").addEventListener("click", async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "dashboard.html";
      } catch (error) {
        alert("Toegang geweigerd: Controleer je e-mail of code.");
      }
    });

    // Registreren
    document.getElementById("link-register").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      
      if(!email || !password) {
        alert("Vul eerst een e-mail en wachtwoord in om te registreren.");
        return;
      }
      
      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("Operator succesvol geregistreerd! Je bent nu ingelogd.");
        window.location.href = "dashboard.html";
      } catch (error) {
        alert("Registratie mislukt: " + error.message);
      }
    });
  </script>

</body>
</html>
